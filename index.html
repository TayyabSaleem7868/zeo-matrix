    <script>
      // Early capture of the PWA install prompt
      window.deferredPrompt = null;
      window.pwaReady = false;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.pwaReady = true;
        window.dispatchEvent(new CustomEvent('pwa-ready-signal'));
        console.log('PWA: Prompt captured in head');
      });
      window.addEventListener('appinstalled', () => {
        window.deferredPrompt = null;
        window.pwaReady = false;
        window.dispatchEvent(new CustomEvent('pwa-installed-signal'));
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
